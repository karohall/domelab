<!DOCTYPE html>
<html lang="en">
<head>

  <title>Riddle.exe — The Cyber Oracle</title>
  <style>
    @font-face {
      font-family: 'W95FA';
      src: url('https://cdn.jsdelivr.net/gh/nicholasgasior/gw-sim@master/other_assets/W95FA.woff2') format('woff2');
      font-weight: normal;
      font-style: normal;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'W95FA', 'Pixelated MS Sans Serif', Arial, sans-serif;
      font-size: 11px;
      color: #000;
    }

    /* === DESKTOP === */
    #desktop {
      width: 100%;
      height: 100%;
      position: relative;
      background: #008080;
    }

    #desktop-bg {
      position: absolute;
      inset: 0;
      background-image: url('https://rrzvgzjttmyseqsmmyvn.supabase.co/storage/v1/object/sign/attachments/1a6dc667-028e-4964-bcb2-e7d1b3e1f395/generated-images/5zmbeceej5b-1777897346385-fe42.png?token=eyJraWQiOiJzdG9yYWdlLXVybC1zaWduaW5nLWtleV8xMjY1MWQ4My04ODE0LTQ3NzMtOGRlNS00MzliNDBkODY2NmYiLCJhbGciOiJIUzI1NiJ9.eyJ1cmwiOiJhdHRhY2htZW50cy8xYTZkYzY2Ny0wMjhlLTQ5NjQtYmNiMi1lN2QxYjNlMWYzOTUvZ2VuZXJhdGVkLWltYWdlcy81em1iZWNlZWo1Yi0xNzc3ODk3MzQ2Mzg1LWZlNDIucG5nIiwiaWF0IjoxNzc3ODk3MzQ2LCJleHAiOjIwOTMyNTczNDZ9.KY-MyFB8f5jXF7LfCERkJNPNGKa5ac7Ob26ferPyINY');
      background-size: cover;
      background-position: center;
      filter: brightness(1.05) saturate(1.2);
      z-index: 0;
    }

    /* === WATER RIPPLE OVERLAY === */
    #ripple-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      pointer-events: none;
      opacity: 0.18;
      mix-blend-mode: overlay;
    }

    /* === DESKTOP SHORTCUTS === */
    .desktop-icon {
      position: absolute;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 64px;
      gap: 4px;
      cursor: pointer;
      padding: 4px 2px;
      border: 1px solid transparent;
      border-radius: 1px;
    }
    .desktop-icon:active {
      border: 1px dotted #fff;
    }
    .desktop-icon .icon-img {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      image-rendering: pixelated;
    }
    .desktop-icon .icon-label {
      font-family: 'W95FA', Arial, sans-serif;
      font-size: 11px;
      color: #fff;
      text-align: center;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
      line-height: 1.2;
      word-break: break-word;
    }

    .px-icon {
      width: 32px;
      height: 32px;
      image-rendering: pixelated;
    }

    /* === TASKBAR === */
    #taskbar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 28px;
      background: #c0c0c0;
      border-top: 2px solid #fff;
      display: flex;
      align-items: center;
      padding: 0 2px;
      z-index: 1000;
      gap: 2px;
    }

    #start-btn {
      height: 22px;
      padding: 0 6px;
      display: flex;
      align-items: center;
      gap: 3px;
      font-family: 'W95FA', Arial, sans-serif;
      font-size: 11px;
      font-weight: bold;
      background: #c0c0c0;
      border: none;
      outline: none;
      cursor: pointer;
      border-top: 2px solid #fff;
      border-left: 2px solid #fff;
      border-bottom: 2px solid #404040;
      border-right: 2px solid #404040;
    }
    #start-btn:active {
      border-top: 2px solid #404040;
      border-left: 2px solid #404040;
      border-bottom: 2px solid #fff;
      border-right: 2px solid #fff;
    }
    #start-btn .win-logo {
      width: 14px; height: 14px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1px;
    }
    #start-btn .win-logo span:nth-child(1) { background: #ff0000; }
    #start-btn .win-logo span:nth-child(2) { background: #00ff00; }
    #start-btn .win-logo span:nth-child(3) { background: #0000ff; }
    #start-btn .win-logo span:nth-child(4) { background: #ffff00; }

    .taskbar-divider {
      width: 2px;
      height: 20px;
      border-left: 1px solid #808080;
      border-right: 1px solid #fff;
      margin: 0 1px;
    }

    #taskbar-app {
      flex: 1;
      height: 22px;
      display: flex;
      align-items: center;
      padding: 0 6px;
      font-family: 'W95FA', Arial, sans-serif;
      font-size: 11px;
      font-weight: bold;
      background: #c0c0c0;
      border-top: 2px solid #404040;
      border-left: 2px solid #404040;
      border-bottom: 2px solid #fff;
      border-right: 2px solid #fff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #tray {
      display: flex;
      align-items: center;
      height: 22px;
      padding: 0 6px;
      border-top: 2px solid #808080;
      border-left: 2px solid #808080;
      border-bottom: 2px solid #fff;
      border-right: 2px solid #fff;
      font-size: 11px;
      font-family: 'W95FA', Arial, sans-serif;
    }

    /* === WINDOW === */
    .win98-window {
      position: absolute;
      z-index: 100;
      background: #c0c0c0;
      border-top: 2px solid #dfdfdf;
      border-left: 2px solid #dfdfdf;
      border-bottom: 2px solid #404040;
      border-right: 2px solid #404040;
      box-shadow: inset 1px 1px 0 #fff, inset -1px -1px 0 #808080;
      display: flex;
      flex-direction: column;
    }

    .title-bar {
      height: 20px;
      background: linear-gradient(90deg, #000080, #1084d0);
      display: flex;
      align-items: center;
      padding: 0 3px;
      flex-shrink: 0;
      gap: 3px;
    }

    .title-bar-icon {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      image-rendering: pixelated;
    }
    .title-bar-icon canvas {
      width: 14px;
      height: 14px;
      image-rendering: pixelated;
    }

    .title-bar-text {
      color: #fff;
      font-size: 11px;
      font-family: 'W95FA', Arial, sans-serif;
      font-weight: bold;
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
    }

    .title-bar-controls {
      display: flex;
      gap: 2px;
      flex-shrink: 0;
    }
    .title-bar-controls button {
      width: 16px;
      height: 14px;
      background: #c0c0c0;
      border-top: 1px solid #fff;
      border-left: 1px solid #fff;
      border-bottom: 1px solid #404040;
      border-right: 1px solid #404040;
      font-family: 'W95FA', Arial, sans-serif;
      font-size: 9px;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      padding: 0;
    }
    .title-bar-controls button:active {
      border-top: 1px solid #404040;
      border-left: 1px solid #404040;
      border-bottom: 1px solid #fff;
      border-right: 1px solid #fff;
    }

    /* === MENU BAR === */
    .menu-bar {
      height: 18px;
      display: flex;
      align-items: center;
      padding: 0 2px;
      gap: 0;
      border-bottom: 1px solid #808080;
      flex-shrink: 0;
    }
    .menu-item {
      padding: 1px 6px;
      font-size: 11px;
      font-family: 'W95FA', Arial, sans-serif;
      cursor: pointer;
      white-space: nowrap;
    }
    .menu-item:hover {
      background: #000080;
      color: #fff;
    }

    /* === WINDOW BODY === */
    .window-body {
      flex: 1;
      padding: 12px;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    /* === ORACLE HEADER === */
    .oracle-header {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 14px;
    }
    .oracle-glyph {
      width: 32px;
      height: 32px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .oracle-glyph canvas {
      image-rendering: pixelated;
    }
    .oracle-text {
      font-size: 11px;
      font-family: 'W95FA', Arial, sans-serif;
      line-height: 1.6;
    }
    .oracle-text .label {
      color: #808080;
      margin-bottom: 2px;
    }
    .oracle-text .question {
      font-size: 12px;
      font-weight: bold;
      margin-top: 4px;
    }

    /* === SEPARATOR === */
    .separator {
      height: 2px;
      border-top: 1px solid #808080;
      border-bottom: 1px solid #fff;
      margin: 8px 0 12px;
    }

    /* === CHECKBOX OPTIONS === */
    .option-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 16px;
    }
    .option-row {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      padding: 2px 0;
    }

    .w98-checkbox {
      width: 13px;
      height: 13px;
      flex-shrink: 0;
      background: #fff;
      border-top: 2px solid #808080;
      border-left: 2px solid #808080;
      border-bottom: 2px solid #dfdfdf;
      border-right: 2px solid #dfdfdf;
      box-shadow: inset 1px 1px 0 #404040;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    .w98-checkbox.checked::after {
      content: '';
      width: 7px;
      height: 7px;
      background: #000;
    }

    .option-label {
      font-size: 11px;
      font-family: 'W95FA', Arial, sans-serif;
      user-select: none;
    }

    /* === BUTTONS === */
    .button-row {
      display: flex;
      justify-content: flex-end;
      gap: 6px;
    }

    .w98-btn {
      min-width: 75px;
      height: 23px;
      padding: 0 12px;
      font-family: 'W95FA', Arial, sans-serif;
      font-size: 11px;
      background: #c0c0c0;
      border-top: 2px solid #fff;
      border-left: 2px solid #fff;
      border-bottom: 2px solid #404040;
      border-right: 2px solid #404040;
      box-shadow: inset -1px -1px 0 #808080;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .w98-btn:active {
      border-top: 2px solid #404040;
      border-left: 2px solid #404040;
      border-bottom: 2px solid #fff;
      border-right: 2px solid #fff;
      box-shadow: inset 1px 1px 0 #808080;
    }
    .w98-btn.primary {
      outline: 1px dotted #000;
      outline-offset: -4px;
    }

    /* === STATUS BAR === */
    .status-bar {
      height: 18px;
      display: flex;
      align-items: center;
      padding: 0 4px;
      border-top: 1px solid #808080;
      flex-shrink: 0;
    }
    .status-bar span {
      font-size: 11px;
      font-family: 'W95FA', Arial, sans-serif;
      color: #808080;
      padding: 0 4px;
      border-top: 1px solid #808080;
      border-left: 1px solid #808080;
      border-bottom: 1px solid #fff;
      border-right: 1px solid #fff;
      flex: 1;
    }

    /* === CONFIRMATION TEXT === */
    #confirmation {
      display: none;
      margin-top: 10px;
      padding: 6px 8px;
      font-family: 'W95FA', Arial, sans-serif;
      font-size: 11px;
      color: #000080;
      border-top: 1px solid #808080;
      border-left: 1px solid #808080;
      border-bottom: 1px solid #fff;
      border-right: 1px solid #fff;
      background: #d4d0c8;
    }
    #confirmation.visible {
      display: block;
    }

      </div>

      <div class="window-body">

          <div class="oracle-glyph"><canvas id="oracle-icon-canvas" width="32" height="32"></canvas></div>
          <div class="oracle-text">
            <div class="label">The Cyber Oracle asks:</div>
            <div class="question">What makes you human?</div>
          </div>
        </div>

        <div class="separator"></div>

        <div class="option-group">
          <div class="option-row" data-value="questions" onclick="selectOption(this)">
            <div class="w98-checkbox" id="cb1"></div>
            <span class="option-label">Your questions</span>
          </div>
          <div class="option-row" data-value="answers" onclick="selectOption(this)">
            <div class="w98-checkbox" id="cb2"></div>
            <span class="option-label">Your answers</span>
          </div>
        </div>

        <div class="button-row">
          <button class="w98-btn" onclick="resetForm()">Reset</button>
          <button class="w98-btn primary" onclick="submitAnswer()">Send reply</button>

        <div id="confirmation"></div>
      </div>

  <script>
    let selected = null;

    /* === PIXEL ART ICON DRAWING === */
    function drawPixelIcon(canvasId, pixels, palette) {
      const c = document.getElementById(canvasId);
      if (!c) return;
      const ctx = c.getContext('2d');
      ctx.imageSmoothingEnabled = false;
      for (let y = 0; y < pixels.length; y++) {
        for (let x = 0; x < pixels[y].length; x++) {
          const ci = pixels[y][x];
          if (ci > 0 && palette[ci]) {
            ctx.fillStyle = palette[ci];
            ctx.fillRect(x, y, 1, 1);
          }
        }
      }
    }

    const riddlePalette = { 1: '#000', 2: '#fff', 3: '#808080', 4: '#000080' };

    /* Draw the shared Riddle.exe icon on the desktop shortcut */

      spawnRipple();

      /* Slow caustic wave fields */
      let t = 0;

      function draw() {
        t += 0.008;
        ctx.clearRect(0, 0, w, h);

        /* Caustic light pattern */
        const grd = ctx.createRadialGradient(
          w * 0.5 + Math.sin(t * 0.7) * w * 0.2,
          h * 0.4 + Math.cos(t * 0.5) * h * 0.15,
          0,
          w * 0.5,
          h * 0.5,
          w * 0.6
        );
        grd.addColorStop(0, 'rgba(180, 230, 255, 0.15)');
        grd.addColorStop(0.5, 'rgba(100, 200, 240, 0.06)');
        grd.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = grd;
        ctx.fillRect(0, 0, w, h);

        /* Second wandering light */
        const grd2 = ctx.createRadialGradient(
          w * 0.3 + Math.cos(t * 0.9) * w * 0.25,
          h * 0.6 + Math.sin(t * 0.6) * h * 0.2,
          0,
          w * 0.5,
          h * 0.5,
          w * 0.5
        );
        grd2.addColorStop(0, 'rgba(220, 180, 255, 0.12)');
        grd2.addColorStop(0.5, 'rgba(180, 140, 220, 0.04)');
        grd2.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = grd2;
        ctx.fillRect(0, 0, w, h);

        /* Concentric ripple rings */
        for (let i = ripples.length - 1; i >= 0; i--) {
          const rp = ripples[i];
          rp.r += rp.speed;
          rp.life = rp.r / rp.maxR;

          if (rp.life >= 1) {
            ripples.splice(i, 1);
            continue;
          }

          const alpha = (1 - rp.life) * 0.4;

          /* Draw 3 concentric rings */
          for (let ring = 0; ring < 3; ring++) {
            const ringR = rp.r - ring * 8;
            if (ringR < 2) continue;
            ctx.beginPath();
            ctx.arc(rp.x, rp.y, ringR, 0, Math.PI * 2);
            ctx.strokeStyle = `rgba(200, 230, 255, ${alpha * (1 - ring * 0.3)})`;
            ctx.lineWidth = 1.5 - ring * 0.4;
            ctx.stroke();
          }
        }

        /* Horizontal wavering lines — like light on pool floor */
        ctx.globalAlpha = 0.06;
        for (let i = 0; i < 8; i++) {
          const yBase = (h / 8) * i + Math.sin(t * 1.2 + i) * 20;
          ctx.beginPath();
          for (let x = 0; x < w; x += 4) {
            const y = yBase + Math.sin(x * 0.01 + t * 2 + i * 0.8) * 12 + Math.sin(x * 0.025 + t * 1.3) * 6;
            if (x === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
          }
          ctx.strokeStyle = '#b0e0ff';
          ctx.lineWidth = 2;
          ctx.stroke();
        }
        ctx.globalAlpha = 1;

        requestAnimationFrame(draw);
      }
      draw();
    })();


    /* === POSITION WINDOW === */
    function positionWindow() {
      const win = document.getElementById('main-window');
      const vw = window.innerWidth;
      const vh = window.innerHeight;
      const ww = Math.min(vw - 20, 310);
      win.style.width = ww + 'px';
      win.style.left = ((vw - ww) / 2) + 'px';
      win.style.top = Math.max(10, (vh - 28 - win.offsetHeight) / 2) + 'px';
    }

    /* === CLOCK === */
    function updateClock() {
      const now = new Date();
      let h = now.getHours();
      const ampm = h >= 12 ? 'PM' : 'AM';
      h = h % 12 || 12;
      const m = String(now.getMinutes()).padStart(2, '0');
      document.getElementById('tray').textContent = h + ':' + m + ' ' + ampm;
    }

    /* === SELECTION === */
    function selectOption(row) {
      document.querySelectorAll('.w98-checkbox').forEach(cb => cb.classList.remove('checked'));
      const cb = row.querySelector('.w98-checkbox');
      cb.classList.add('checked');
      selected = row.getAttribute('data-value');
      document.getElementById('status-text').textContent = 'Selected: ' + row.querySelector('.option-label').textContent;
      document.getElementById('confirmation').classList.remove('visible');
    }

    /* === RESET === */
    function resetForm() {
      document.querySelectorAll('.w98-checkbox').forEach(cb => cb.classList.remove('checked'));
      selected = null;
      document.getElementById('status-text').textContent = 'Ready';
      document.getElementById('confirmation').classList.remove('visible');
    }

    /* === SUBMIT === */
    function submitAnswer() {
      if (!selected) {
        document.getElementById('status-text').textContent = 'Please select an answer.';
        return;
      }
      const conf = document.getElementById('confirmation');
      conf.textContent = 'Your answer has been noted by The Cyber Oracle.';
      conf.classList.add('visible');
      document.getElementById('status-text').textContent = 'Transmission complete';
    }

    /* === INIT === */
    updateClock();
    setInterval(updateClock, 10000);
    window.addEventListener('resize', positionWindow);
    window.addEventListener('load', positionWindow);
    positionWindow();
  </script>
</body>
</html>
